name: CI (pre-commit hooks, mdBook checks)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name for the mdBook build artifact"
        required: true
        type: string
      checkout-ref:
        description: "Immutable commit SHA to build"
        required: true
        type: string

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.checkout-ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Lint, test, and build mdBook (HTML)
        run: make docker-ci

      - name: Upload built site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact-name }}
          path: book/html/
          retention-days: 1
