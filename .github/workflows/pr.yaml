name: PR CI + Deployment preview

on:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    if: (github.event.pull_request == null || !github.event.pull_request.draft)
    uses: ./.github/workflows/ci.yaml
    with:
      artifact-name: specs-site-pr-${{ github.event.pull_request.number }}
      checkout-ref: ${{ github.sha }}

  deploy-preview:
    needs: ci
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    environment:
      name: preview
    steps:
      - name: Download built site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: specs-site-pr-${{ github.event.pull_request.number }}
          path: book/html

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: |
            pages deploy ./book/html --project-name algorand-specs --branch pr-${{ github.event.pull_request.number }}

  # Satisfies branch protection when deploy is skipped for external PRs
  deploy-status:
    needs: [ci, deploy-preview]
    if: always() && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "CI failed"
            exit 1
          fi
          if [[ "${{ needs.deploy-preview.result }}" == "failure" ]]; then
            echo "Deploy failed"
            exit 1
          fi
          echo "All checks passed (deploy may have been skipped)"
