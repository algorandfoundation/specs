services:
  mdbook:
    container_name: mdbook
    build:
      context: .
      target: ci-cd
      args:
        UV_VERSION: "${UV_VERSION:?UV_VERSION is required; run via Make or pass --env-file toolchain.env}"
        UV_IMAGE_SHA256: "${UV_IMAGE_SHA256:?UV_IMAGE_SHA256 is required; run via Make or pass --env-file toolchain.env}"
    platform: linux/amd64
    working_dir: /book
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      HOME: /book/.cache/linux-amd64/home
      PRE_COMMIT_HOME: /book/.cache/linux-amd64/pre-commit
      UV_CACHE_DIR: /book/.cache/linux-amd64/uv
      UV_PYTHON_INSTALL_DIR: /book/.cache/linux-amd64/uv/python
    ports:
      - 3000:3000
    command: ["mdbook", "serve", "--hostname", "0.0.0.0", "--port", "3000"]
    volumes:
      - .:/book

  mdbook-release:
    container_name: mdbook-release
    build:
      context: .
      target: release
      args:
        UV_VERSION: "${UV_VERSION:?UV_VERSION is required; run via Make or pass --env-file toolchain.env}"
        UV_IMAGE_SHA256: "${UV_IMAGE_SHA256:?UV_IMAGE_SHA256 is required; run via Make or pass --env-file toolchain.env}"
    platform: linux/amd64
    working_dir: /book
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      HOME: /book/.cache/linux-amd64/home
    ports:
      - 3001:3000
    command: ["mdbook", "serve", "--hostname", "0.0.0.0", "--port", "3000"]
    profiles:
      - release
    volumes:
      - .:/book
