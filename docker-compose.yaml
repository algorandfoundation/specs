services:
  mdbook:
    container_name: mdbook
    build:
      context: .
      target: ci-cd
      args:
        UV_VERSION: ${UV_VERSION}
        UV_IMAGE_SHA256: ${UV_IMAGE_SHA256}
    working_dir: /book
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      HOME: /book/.cache/home
      PRE_COMMIT_HOME: /book/.cache/pre-commit
      UV_CACHE_DIR: /book/.cache/uv
      UV_PYTHON_INSTALL_DIR: /book/.cache/uv/python
    ports:
      - 3000:3000
    command: ["mdbook", "serve", "--hostname", "0.0.0.0", "--port", "3000"]
    volumes:
      - .:/book

  mdbook-release:
    container_name: mdbook-release
    build:
      context: .
      target: release
      args:
        UV_VERSION: ${UV_VERSION}
        UV_IMAGE_SHA256: ${UV_IMAGE_SHA256}
    working_dir: /book
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      HOME: /book/.cache/home
    ports:
      - 3001:3000
    command: ["mdbook", "serve", "--hostname", "0.0.0.0", "--port", "3000"]
    profiles:
      - release
    volumes:
      - .:/book
